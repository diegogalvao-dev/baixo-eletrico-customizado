# configuracao do bd
quarkus.datasource.db-kind = postgresql
quarkus.datasource.username = postgres
quarkus.datasource.password = 121317
quarkus.datasource.jdbc.url = jdbc:postgresql://localhost:5432/instrumento

# Faz o Hibernate dropar e recriar as tabelas toda vez que a aplica��o inicia
quarkus.hibernate-orm.schema-management.strategy=update

# configuracao do cors
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,PUT,POST,DELETE,PATCH
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
quarkus.http.cors.exposed-headers= *, Authorization
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

# base url para o type em exception
%dev.problem.base-url=http://localhost:8080
%prod.problem.base-url=https://api.seusistema.com
